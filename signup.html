<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h2 class="logo">Apex Academy</h2>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#courses">About</a>
      <a href="index.html#faculty">Services</a>
      <a href="index.html#about">Portfolio</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </nav>

  <!-- Signup Form -->
  <div class="login-container">
    <form class="login-form" id="signup-form">
      <h2>Sign Up</h2>

      <input type="text" id="signup-name" placeholder="Full Name" required>
      <input type="email" id="signup-email" placeholder="Enter Email" required>
      <input type="password" id="signup-password" placeholder="Create Password" required>

      <button type="submit">Sign Up</button>

      <p id="signup-message">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>

</body>
<script src="script.js"></script>
</html>
